<div class="row row-cols-1 row-cols-md-2 g-4">
  <div class="col" *ngFor="let product of filteredProducts">
    <div class="card" appHilightCard [quantity]="product.quantity" ]>
      <div class="card-body">
        <h5 class="card-title">{{ product.name }}</h5>

        @switch (product.quantity) {
          @case (0) {
            <p>Quantity: out of stock</p>
          }
          @case (1) {
            <p class="text-danger">Quantity: last item</p>
          }
          @case (2) {
            <p>Quantity: last 2 items</p>
          }
          @default {
            <p>Quantity: {{ product.quantity }}</p>
          }
        }
        <p class="card-text">{{ product.price | currency: 'EGP ' : 'symbol' }}</p>
        <input type="number" #count />
        <button
          class="btn btn-success mx-3"
          (click)="changeQuantity(product, count)"
          [disabled]="product.quantity == 0"
        >
          buy
        </button>
        <!-- <button class="btn btn-success mx-3" [routerLink]="['/details', product.id]">
          Details
        </button> -->
        <button class="btn btn-success mx-3" (click)="navigateToDetails(product.id)">
          Details
        </button>
        <button class="btn btn-primary mx-3" (click)="editProduct(product.id)">Edit</button>
        <button class="btn btn-danger mx-3" (click)="deleteProduct(product.id)">Delete</button>
      </div>
    </div>
  </div>
</div>
