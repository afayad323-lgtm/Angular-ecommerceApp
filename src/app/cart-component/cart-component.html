<h2>Cart</h2>

<div *ngFor="let item of cartItems" class="card mb-3">
  <div class="card-body">
    <h5>{{ item.name }}</h5>
    <p>Price: {{ item.price }}</p>
    <p>Quantity: {{ item.quantity }}</p>
    <button class="btn btn-danger" (click)="remove(item.id)">Remove</button>
  </div>
</div>

<h3>Total: {{ totalPrice }}</h3>
